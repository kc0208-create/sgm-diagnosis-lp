<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sagemaster｜LINEへ移動中</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  background:#0A0A1A;
  color:#FFFFFF;
  font-family:'Helvetica Neue',sans-serif;
  min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  text-align:center;
  padding:24px;
}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{
  width:56px;height:56px;border-radius:50%;
  border:3px solid rgba(0,224,255,0.15);
  border-top-color:#00E0FF;
  animation:spin 1s linear infinite;
  margin:0 auto 20px;
}
p{font-size:15px;color:#B0B0D0;line-height:1.7}
</style>
</head>
<body>
<div>
  <div class="spinner"></div>
  <p>LINEへ移動しています…<br>しばらくお待ちください</p>
</div>
<script>
// URLパラメーターからスコアバケットを取得（なければhigh扱い）
const ELME_URLS = {
  low : 'https://s.lmes.jp/landing-qr/2007953848-GyLQgK7x?uLand=hfWgxy',
  high: 'https://s.lmes.jp/landing-qr/2007953848-GyLQgK7x?uLand=Em5yLq',
};
const params = new URLSearchParams(location.search);
const bucket = params.get('bucket') || 'high';
const url = ELME_URLS[bucket] || ELME_URLS.high;

// 即リダイレクト
location.replace(url);
</script>
</body>
</html>
